name: Release Windows

# Final (stable) releases. Triggered when a human publishes a GitHub Release,
# for example v1.1.1. Because a human (not the GITHUB_TOKEN) publishes it, this
# event fires normally and builds the stable binaries.
on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish the release
    uses: ./.github/workflows/build-windows.yml
    with:
      ref: ${{ github.event.release.tag_name }}
      tag: ${{ github.event.release.tag_name }}

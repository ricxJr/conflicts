name: Prepare Next Version

# Runs when a human publishes an official (stable) GitHub Release, alongside the
# stable build in release.yml. It does NOT build anything and it does NOT open a
# pull request: it prepares the next development cycle by bumping the product
# version one MINOR step (e.g. after releasing v1.1.1 the next version becomes
# v1.2.0, then v1.3.0, ...), then pushes a branch with that single commit.
#
# Opening the PR is left to you (GitHub Actions is not allowed to create PRs in
# this repo anyway): the run summary prints a ready-to-use "compare" link. Once
# you merge that PR, beta-release.yml starts producing betas of the new version
# (v1.2.0-beta.1, ...).
on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: prepare-next-version
  cancel-in-progress: false

jobs:
  prepare:
    name: Bump the minor version and push the branch
    runs-on: ubuntu-latest
    # Only for real, stable releases -- skip drafts and pre-releases (betas).
    if: ${{ !github.event.release.prerelease && !github.event.release.draft }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump the minor version
        id: bump
        env:
          BASE_VERSION: ${{ github.event.release.tag_name }}
        run: node scripts/bump-minor-version.mjs --base "$BASE_VERSION"

      - name: Commit the bump on a new branch and push it
        env:
          BRANCH: ${{ steps.bump.outputs.branch }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -am "chore(release): preparar próxima versão v${NEW_VERSION}"
          git push --force origin "HEAD:refs/heads/${BRANCH}"

      - name: Print the compare link to open the PR
        env:
          BRANCH: ${{ steps.bump.outputs.branch }}
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          BASE_VERSION: ${{ steps.bump.outputs.base_version }}
        run: |
          set -euo pipefail
          compare_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/main...${BRANCH}?expand=1"
          {
            echo "## Próxima versão preparada"
            echo ""
            echo "Bump automático após a release **v${BASE_VERSION}**: \`v${BASE_VERSION}\` → \`v${NEW_VERSION}\` (minor)."
            echo ""
            echo "Branch \`${BRANCH}\` publicada. Abra o PR contra \`main\` por aqui:"
            echo ""
            echo "➡️ [Abrir pull request](${compare_url})"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Branch publicada: ${BRANCH}"
          echo "Abra o PR em: ${compare_url}"

name: Beta Release

# Runs on every push to main (i.e. whenever a PR is merged). It:
#   1. publishes a beta pre-release for the current version (e.g. v1.1.1-beta.1),
#      incrementing the beta counter on every merge (beta.1, beta.2, ...);
#   2. builds and attaches the Windows binaries to that pre-release.
#
# The version in package.json is NOT bumped automatically: every merge keeps
# producing betas of the SAME version. The version is bumped only when you cut
# an official release -- do it through a normal PR before publishing the
# stable GitHub Release handled by release.yml.
on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: beta-release
  cancel-in-progress: false

jobs:
  publish-beta:
    name: Publish the beta pre-release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.beta.outputs.tag }}
    steps:
      - name: Check out the merge commit with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute the beta tag and publish the pre-release
        id: beta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="$(node -p "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "The version in package.json ('$version') must be a clean X.Y.Z before a beta can be built." >&2
            exit 1
          fi

          git fetch --tags --force
          escaped="${version//./\\.}"
          last="$(git tag --list "v${version}-beta.*" \
            | sed -E "s/^v${escaped}-beta\.//" \
            | grep -E '^[0-9]+$' \
            | sort -n \
            | tail -n1 || true)"
          if [[ -z "${last}" ]]; then
            next=1
          else
            next=$((last + 1))
          fi

          betaTag="v${version}-beta.${next}"
          echo "Publishing ${betaTag} at ${GITHUB_SHA}"
          gh release create "${betaTag}" \
            --target "${GITHUB_SHA}" \
            --prerelease \
            --title "MergeScope ${betaTag}" \
            --notes "Beta automático gerado a partir do commit ${GITHUB_SHA} na branch main."

          echo "tag=${betaTag}" >> "$GITHUB_OUTPUT"

  build-beta:
    name: Build and attach the beta binaries
    needs: publish-beta
    uses: ./.github/workflows/build-windows.yml
    with:
      ref: ${{ needs.publish-beta.outputs.tag }}
      tag: ${{ needs.publish-beta.outputs.tag }}
